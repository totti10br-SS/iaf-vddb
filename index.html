<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>IAF VDDB</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #0f0f0f;
    color: #e8e8e8;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    background: #1a1a1a;
    border-bottom: 1px solid #2a2a2a;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }

  .logo {
    width: 32px; height: 32px;
    background: linear-gradient(135deg, #e63946, #c1121f);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; font-weight: 700; color: #fff;
  }

  header h1 { font-size: 16px; font-weight: 600; color: #fff; }
  header small { font-size: 11px; color: #888; display: block; }

  .filial-select {
    margin-left: auto;
    background: #2a2a2a;
    border: 1px solid #3a3a3a;
    color: #e8e8e8;
    padding: 4px 8px;
    border-radius: 6px;
    font-size: 12px;
  }

  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .msg {
    max-width: 88%;
    padding: 10px 14px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.5;
    word-wrap: break-word;
  }

  .msg.user {
    background: #c1121f;
    color: #fff;
    align-self: flex-end;
    border-bottom-right-radius: 4px;
  }

  .msg.bot {
    background: #1e1e1e;
    border: 1px solid #2a2a2a;
    color: #e8e8e8;
    align-self: flex-start;
    border-bottom-left-radius: 4px;
  }

  .msg.bot .sql-toggle {
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid #2a2a2a;
    font-size: 11px;
    color: #666;
    cursor: pointer;
  }

  .msg.bot .sql-toggle:hover { color: #999; }

  .msg.bot pre {
    margin-top: 6px;
    background: #0a0a0a;
    padding: 8px;
    border-radius: 6px;
    font-size: 11px;
    color: #888;
    overflow-x: auto;
    white-space: pre-wrap;
    display: none;
  }

  .msg.bot pre.visible { display: block; }

  .msg.bot .meta {
    font-size: 11px;
    color: #555;
    margin-top: 6px;
  }

  .msg.loading {
    background: #1e1e1e;
    border: 1px solid #2a2a2a;
    align-self: flex-start;
    border-bottom-left-radius: 4px;
    color: #666;
  }

  .dots span {
    animation: blink 1.2s infinite;
    font-size: 20px;
  }
  .dots span:nth-child(2) { animation-delay: .2s; }
  .dots span:nth-child(3) { animation-delay: .4s; }
  @keyframes blink { 0%,80%,100%{opacity:0} 40%{opacity:1} }

  .sugestoes {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    padding: 0 16px 8px;
    flex-shrink: 0;
  }

  .sugestao {
    background: #1e1e1e;
    border: 1px solid #2a2a2a;
    color: #aaa;
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 12px;
    cursor: pointer;
    white-space: nowrap;
    transition: border-color .2s;
  }
  .sugestao:hover { border-color: #c1121f; color: #e8e8e8; }

  footer {
    background: #1a1a1a;
    border-top: 1px solid #2a2a2a;
    padding: 10px 12px;
    display: flex;
    gap: 8px;
    flex-shrink: 0;
  }

  #input {
    flex: 1;
    background: #2a2a2a;
    border: 1px solid #3a3a3a;
    color: #e8e8e8;
    padding: 10px 14px;
    border-radius: 24px;
    font-size: 14px;
    outline: none;
    transition: border-color .2s;
  }
  #input:focus { border-color: #c1121f; }
  #input::placeholder { color: #555; }

  #btn {
    width: 40px; height: 40px;
    background: #c1121f;
    border: none;
    border-radius: 50%;
    color: #fff;
    font-size: 18px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background .2s;
    flex-shrink: 0;
  }
  #btn:hover { background: #e63946; }
  #btn:disabled { background: #333; cursor: not-allowed; }
</style>
</head>
<body>

<header>
  <div class="logo">V</div>
  <div>
    <h1>IAF VDDB</h1>
    <small>Análise de vendas</small>
  </div>
  <select class="filial-select" id="filial">
    <option value="TODAS">Todas filiais</option>
    <option value="ITAP">ITAP</option>
    <option value="BJESUS">BJESUS</option>
    <option value="PORC">PORC</option>
  </select>
</header>

<div id="chat">
  <div class="msg bot">
    Olá! Sou o assistente de análise de vendas. Pode me perguntar sobre faturamento, produtos, clientes, vendedores ou qualquer dado disponível.
  </div>
</div>

<div class="sugestoes" id="sugestoes">
  <div class="sugestao" onclick="enviar(this.textContent)">Top 10 produtos do mês</div>
  <div class="sugestao" onclick="enviar(this.textContent)">Faturamento por filial</div>
  <div class="sugestao" onclick="enviar(this.textContent)">Melhores clientes</div>
  <div class="sugestao" onclick="enviar(this.textContent)">Vendas de hoje</div>
</div>

<footer>
  <input id="input" type="text" placeholder="Pergunte sobre as vendas..." autocomplete="off">
  <button id="btn" onclick="enviarInput()">➤</button>
</footer>

<script>
const chat = document.getElementById("chat");
const input = document.getElementById("input");
const btn = document.getElementById("btn");

input.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); enviarInput(); }
});

function enviarInput() {
  const texto = input.value.trim();
  if (!texto) return;
  input.value = "";
  enviar(texto);
}

async function enviar(texto) {
  if (!texto) return;

  // esconde sugestões após primeira pergunta
  document.getElementById("sugestoes").style.display = "none";

  // mensagem do usuário
  addMsg(texto, "user");

  // loading
  const loading = addMsg('<div class="dots"><span>●</span><span>●</span><span>●</span></div>', "loading");
  btn.disabled = true;

  try {
    const filial = document.getElementById("filial").value;
    const res = await fetch("/ask", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ pergunta: texto, filial }),
    });

    const data = await res.json();
    loading.remove();

    const sqlId = "sql-" + Date.now();
    const html = `
      ${data.resposta.replace(/\n/g, "<br>")}
      <div class="meta">${data.row_count} registro(s) encontrado(s)</div>
      <div class="sql-toggle" onclick="toggleSql('${sqlId}')">▸ ver SQL gerado</div>
      <pre id="${sqlId}">${escHtml(data.sql)}</pre>
    `;
    addMsg(html, "bot");

  } catch (err) {
    loading.remove();
    addMsg("Erro ao consultar. Tente novamente.", "bot");
  }

  btn.disabled = false;
  chat.scrollTop = chat.scrollHeight;
}

function addMsg(html, tipo) {
  const div = document.createElement("div");
  div.className = "msg " + tipo;
  div.innerHTML = html;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

function toggleSql(id) {
  const pre = document.getElementById(id);
  if (pre) pre.classList.toggle("visible");
}

function escHtml(str) {
  return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}
</script>
</body>
</html>
